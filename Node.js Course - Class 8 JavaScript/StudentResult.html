<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;

        }
        button{
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            cursor: pointer;
            margin-top: 20px;
        }
        .pass{
            color: green;
        }
        .fail{
            color: red;
        }
    </style>
</head>
<body>
    
    <h1>Student result checker</h1>
    <button onclick="checkResult()">Check Result</button>

    <div id="output"></div>



    <script>
        function checkResult() {
            let marks = [3.1, 3.2, 2.5, 3.6, 3.0, 2.8, 3.4, 2.9, 3.3, 2.7];
            let output = "";

            for(let i = 0 ; i < marks.length; i++){
                if(marks[i]>= 3.0){
                    output += "<p class='pass'>student " + (i+1) + " passed with marks: " + marks[i] + "</p>";
                }else{
                    output += "<p class='fail'>student " + (i+1) + " failed with marks: " + marks[i] + "</p>";
                }
            }

            document.getElementById("output").innerHTML = output;
        }



        //simple samajh lo




        // function = machine
        // loop = repeat machine
        // if else = decision marker
        // html = structure of webpage
        // css = design of webpage
    </script>
</body>
</html>
