<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>


.dropdown {
    position: relative;
    display: inline-block;
}
.dropdown-content {
    display: none;
    background-color: white;
    border: 1px solid #ddd;
    position: absolute;
    padding: 10px;
    /* z-index: 1; */
}
.dropdown:hover .dropdown-content {
    display: block;
}
    </style>
</head>
<body>
    <div class="dropdown">
        <button>dropdown</button>    
        <div class="dropdown-content">
            <a href="#">link 1</a>
            <a href="#">link 2</a>
            <a href="#">link 3</a>
        </div>
    
    </div>
</body>
</html>
