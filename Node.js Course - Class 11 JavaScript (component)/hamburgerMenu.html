<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .nav{
            background-color: #222;
            color: white;
            display: flex;
            padding: 20px;
            justify-content: space-between;}


            .menu{
                display: none;
                flex-direction: column;
                background: #333;
                position: absolute;
                top: 60px;
                right: 0;
                padding: 10px;
            }
            .hamburger{
                cursor: pointer;
               
            }
            .hamburger div{
                width: 25px;
                height: 3px;
                background-color: white;
                margin: 5px;
                border-radius: 5px;
            }
            .menu a{
                color: white;
                text-decoration: none;
                padding: 5px;
            }

            .menu.active{
                display: flex;
            }
    </style>

</head>
<body>
    <div class="nav">
        <div>logo</div>
        <div class="hamburger" onclick="toggleMenu()">
            <div></div>
            <div></div>
            <div></div>
        </div>
    </div>

    <div class="menu" id="menu">
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>    
        </ul>
    </div>



    <script>
        function toggleMenu(){
            document.getElementById("menu").classList.toggle("active");
        }
    </script>
</body>
</html>
